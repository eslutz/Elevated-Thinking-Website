<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Preview Deployments</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #f7f8fa;
        color: #111827;
        display: grid;
        place-items: center;
        padding: 2rem 1rem;
      }

      .page {
        width: min(760px, 100%);
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        padding: 2rem;
        box-shadow: 0 8px 24px rgba(17, 24, 39, 0.06);
      }

      h1,
      h2 {
        margin: 0;
        line-height: 1.2;
      }

      h1 {
        font-size: clamp(1.6rem, 2vw, 2rem);
        margin-bottom: 0.75rem;
      }

      h2 {
        margin-top: 2rem;
        margin-bottom: 1rem;
        font-size: 1.125rem;
        color: #374151;
      }

      p {
        margin: 0;
        color: #4b5563;
      }

      a {
        color: #2563eb;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      ul {
        list-style: none;
        margin: 0;
        padding: 0;
      }

      li {
        margin-top: 0.75rem;
      }

      li:first-child {
        margin-top: 0;
      }

      .pr-link {
        display: block;
        background: #f9fafb;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        padding: 0.75rem 1rem;
        color: #1f2937;
      }

      .pr-link:hover {
        background: #f3f4f6;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <h1>Preview Deployments</h1>
      <p><a href="/Elevated-Thinking-Website/preview/">Main branch preview</a></p>
      <h2>Open pull request previews</h2>
      <ul>
  <li><a class="pr-link" href="/Elevated-Thinking-Website/preview/pr-9/">PR #9: Generate preview index via reusable Node script and template</a></li>
</ul>
    </main>
  </body>
</html>
