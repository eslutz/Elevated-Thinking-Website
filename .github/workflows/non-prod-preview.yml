name: Non-Prod Preview Deploy

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: non-prod-preview-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

jobs:
  validate:
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Check types
        run: npm run typecheck

  unit_tests:
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: >-
          npm run test:unit -- --coverage
          --coverageReporters=text-summary
          --coverageReporters=lcov
          --coverageReporters=json-summary

      - name: Upload coverage artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: coverage-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref_name }}
          path: coverage/
          if-no-files-found: ignore

      - name: Publish coverage summary
        if: ${{ !cancelled() }}
        run: |
          node <<'EOF'
          const fs = require('node:fs');
          const summaryPath = 'coverage/coverage-summary.json';

          if (!fs.existsSync(summaryPath)) {
            process.exit(0);
          }

          const summary = JSON.parse(fs.readFileSync(summaryPath, 'utf8')).total;
          const rows = [
            ['Statements', summary.statements.pct],
            ['Branches', summary.branches.pct],
            ['Functions', summary.functions.pct],
            ['Lines', summary.lines.pct],
          ];

          const body = [
            '## Unit Test Coverage',
            '',
            '| Metric | Coverage |',
            '| --- | ---: |',
            ...rows.map(([label, value]) => `| ${label} | ${value}% |`),
          ].join('\n');

          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${body}\n`);
          EOF

  smoke_tests:
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser dependencies
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: npm run test:smoke

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: playwright-report-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref_name }}
          path: playwright-report/
          if-no-files-found: ignore

  deploy:
    if: >-
      github.event_name == 'push' ||
      (
        github.event_name == 'pull_request' &&
        github.event.action != 'closed' &&
        github.event.pull_request.head.repo.full_name == github.repository
      )
    needs:
      - validate
      - unit_tests
      - smoke_tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    environment:
      name: non-prod-preview
      url: ${{ steps.deploy.outputs.static_web_app_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Collect open pull requests
        if: github.event_name == 'push'
        id: open_pull_requests
        uses: actions/github-script@v9.0.0
        with:
          result-encoding: string
          script: |
            const pullRequests = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            return JSON.stringify(
              pullRequests
                .filter(
                  (pullRequest) =>
                    pullRequest.head.repo?.full_name === context.payload.repository.full_name
                )
                .map((pullRequest) => ({
                  number: pullRequest.number,
                  title: pullRequest.title,
                }))
            );

      - name: Build non-production preview index
        if: github.event_name == 'push'
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          MAIN_PREVIEW_URL: /preview/
          OPEN_PRS_JSON: ${{ steps.open_pull_requests.outputs.result }}
          SWA_DEFAULT_HOSTNAME: delightful-plant-05da2520f.7.azurestaticapps.net
          SWA_PREVIEW_REGION: eastus2
        run: npm run build:non-prod-preview

      - name: Build pull request preview
        if: github.event_name == 'pull_request'
        run: npm run build

      - name: Verify Static Web Apps config
        run: test -f dist/staticwebapp.config.json

      - name: Deploy to Azure Static Web Apps
        id: deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_NONPROD_PREVIEW }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dist
          skip_app_build: true
          production_branch: main

  close_preview:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    environment:
      name: non-prod-preview
    steps:
      - name: Close Azure Static Web Apps PR environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_NONPROD_PREVIEW }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: close
          app_location: /
