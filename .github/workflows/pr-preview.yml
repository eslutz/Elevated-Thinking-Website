name: Preview Deployments

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".github/**"

permissions:
  contents: read

concurrency:
  group: preview-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

jobs:
  validate:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Check types
        run: npm run typecheck

  unit_tests:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: >-
          npm run test:unit -- --coverage
          --coverageReporters=text-summary
          --coverageReporters=lcov
          --coverageReporters=json-summary

      - name: Upload coverage artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: coverage-pr-${{ github.event.pull_request.number }}
          path: coverage/
          if-no-files-found: ignore

      - name: Publish coverage summary
        if: ${{ !cancelled() }}
        run: |
          node <<'EOF'
          const fs = require('node:fs');
          const summaryPath = 'coverage/coverage-summary.json';

          if (!fs.existsSync(summaryPath)) {
            process.exit(0);
          }

          const summary = JSON.parse(fs.readFileSync(summaryPath, 'utf8')).total;
          const rows = [
            ['Statements', summary.statements.pct],
            ['Branches', summary.branches.pct],
            ['Functions', summary.functions.pct],
            ['Lines', summary.lines.pct],
          ];

          const body = [
            '## Unit Test Coverage',
            '',
            '| Metric | Coverage |',
            '| --- | ---: |',
            ...rows.map(([label, value]) => `| ${label} | ${value}% |`),
          ].join('\n');

          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${body}\n`);
          EOF

  smoke_tests:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser dependencies
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: npm run test:smoke

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-pr-${{ github.event.pull_request.number }}
          path: playwright-report/
          if-no-files-found: ignore

  build_pr_preview:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    needs:
      - validate
      - unit_tests
      - smoke_tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build PR preview bundle
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          if [ "$REPO_NAME" = "$REPO_OWNER.github.io" ]; then
            SITE_PREFIX=""
          else
            SITE_PREFIX="/$REPO_NAME"
          fi

          npm run build -- --base="${SITE_PREFIX}/preview/pr-${{ github.event.pull_request.number }}/"

      - name: Upload PR preview artifact
        uses: actions/upload-artifact@v7
        with:
          name: pr-preview-dist
          path: dist
          if-no-files-found: error

  build_main_preview:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build main preview bundle
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          if [ "$REPO_NAME" = "$REPO_OWNER.github.io" ]; then
            SITE_PREFIX=""
          else
            SITE_PREFIX="/$REPO_NAME"
          fi

          npm run build -- --base="${SITE_PREFIX}/preview/"

      - name: Upload main preview artifact
        uses: actions/upload-artifact@v7
        with:
          name: main-preview-dist
          path: dist
          if-no-files-found: error

  deploy_pr_preview:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.action != 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    needs: build_pr_preview
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Download PR preview artifact
        uses: actions/download-artifact@v8
        with:
          name: pr-preview-dist
          path: dist

      - name: Publish PR preview and index to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PREVIEW_DIR: preview/pr-${{ github.event.pull_request.number }}
          REPO_URL: https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
        run: |
          set -euo pipefail

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads "$REPO_URL" gh-pages >/dev/null 2>&1; then
            git clone --depth 1 --branch gh-pages "$REPO_URL" gh-pages
          else
            git init gh-pages
            (
              cd gh-pages
              git checkout --orphan gh-pages
              touch .nojekyll
              git add .nojekyll
              git commit -m "Initialize GitHub Pages branch"
              git remote add origin "$REPO_URL"
              git push origin gh-pages
            )
          fi

          mkdir -p "gh-pages/$PREVIEW_DIR"
          rsync -a --delete dist/ "gh-pages/$PREVIEW_DIR/"
          touch gh-pages/.nojekyll

          OPEN_PRS_JSON="$(curl -sSf -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${GITHUB_REPOSITORY}/pulls?state=open&per_page=100")"
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          REPO_OWNER="${GITHUB_REPOSITORY%%/*}"

          if [ "$REPO_NAME" = "$REPO_OWNER.github.io" ]; then
            SITE_PREFIX=""
          else
            SITE_PREFIX="/$REPO_NAME"
          fi

          export OPEN_PRS_JSON REPO_NAME SITE_PREFIX

          node scripts/build-preview-index.mjs gh-pages/index.html

          (
            cd gh-pages
            git add -A .

            if git diff --cached --quiet; then
              echo "No preview changes to publish."
              exit 0
            fi

            git commit -m "Deploy preview for PR #${{ github.event.pull_request.number }}"
            git push origin gh-pages
          )

      - name: Comment preview URL
        uses: actions/github-script@v8
        with:
          script: |
            const marker = '<!-- pr-preview-url -->';
            const repoName = context.repo.repo;
            const owner = context.repo.owner;
            const sitePrefix = repoName.toLowerCase() === `${owner.toLowerCase()}.github.io`
              ? ''
              : `/${repoName}`;
            const previewUrl = `https://${owner}.github.io${sitePrefix}/preview/pr-${context.issue.number}/`;
            const body = `${marker}\nPreview deployed: ${previewUrl}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find((comment) =>
              comment.user.type === 'Bot' && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

  deploy_main_preview:
    if: github.event_name == 'push'
    needs: build_main_preview
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Download main preview artifact
        uses: actions/download-artifact@v8
        with:
          name: main-preview-dist
          path: dist

      - name: Publish main preview and index to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PREVIEW_DIR: preview
          REPO_URL: https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
        run: |
          set -euo pipefail

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads "$REPO_URL" gh-pages >/dev/null 2>&1; then
            git clone --depth 1 --branch gh-pages "$REPO_URL" gh-pages
          else
            git init gh-pages
            (
              cd gh-pages
              git checkout --orphan gh-pages
              touch .nojekyll
              git add .nojekyll
              git commit -m "Initialize GitHub Pages branch"
              git remote add origin "$REPO_URL"
              git push origin gh-pages
            )
          fi

          mkdir -p "gh-pages/$PREVIEW_DIR"
          rsync -a --delete dist/ "gh-pages/$PREVIEW_DIR/"
          touch gh-pages/.nojekyll

          OPEN_PRS_JSON="$(curl -sSf -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${GITHUB_REPOSITORY}/pulls?state=open&per_page=100")"
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          REPO_OWNER="${GITHUB_REPOSITORY%%/*}"

          if [ "$REPO_NAME" = "$REPO_OWNER.github.io" ]; then
            SITE_PREFIX=""
          else
            SITE_PREFIX="/$REPO_NAME"
          fi

          export OPEN_PRS_JSON REPO_NAME SITE_PREFIX

          node scripts/build-preview-index.mjs gh-pages/index.html

          (
            cd gh-pages
            git add -A .

            if git diff --cached --quiet; then
              echo "No preview changes to publish."
              exit 0
            fi

            git commit -m "Deploy main preview from ${GITHUB_SHA}"
            git push origin gh-pages
          )

  cleanup_preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Remove preview from gh-pages and refresh index
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_URL: https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          PREVIEW_DIR: preview/pr-${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if ! git ls-remote --exit-code --heads "$REPO_URL" gh-pages >/dev/null 2>&1; then
            echo "gh-pages branch does not exist. Nothing to clean up."
            exit 0
          fi

          git clone --depth 1 --branch gh-pages "$REPO_URL" gh-pages
          rm -rf "gh-pages/$PREVIEW_DIR"
          touch gh-pages/.nojekyll

          OPEN_PRS_JSON="$(curl -sSf -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${GITHUB_REPOSITORY}/pulls?state=open&per_page=100")"
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          REPO_OWNER="${GITHUB_REPOSITORY%%/*}"

          if [ "$REPO_NAME" = "$REPO_OWNER.github.io" ]; then
            SITE_PREFIX=""
          else
            SITE_PREFIX="/$REPO_NAME"
          fi

          export OPEN_PRS_JSON REPO_NAME SITE_PREFIX

          node scripts/build-preview-index.mjs gh-pages/index.html

          (
            cd gh-pages
            git add -A .

            if git diff --cached --quiet; then
              echo "Preview directory already absent."
              exit 0
            fi

            git commit -m "Remove preview for PR #${{ github.event.pull_request.number }}"
            git push origin gh-pages
          )
