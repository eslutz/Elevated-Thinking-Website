name: API Auth Gateway

on:
  pull_request:
    paths:
      - "api/**"
      - ".github/workflows/api-auth-gateway.yml"
  push:
    branches:
      - main
    paths:
      - "api/**"
      - ".github/workflows/api-auth-gateway.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: api-auth-gateway-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore AuthGateway.sln

      - name: Build
        run: dotnet build AuthGateway.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test AuthGateway.sln --configuration Release --no-build --collect:"XPlat Code Coverage"

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    environment: preview-auth
    defaults:
      run:
        working-directory: api
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore AuthGateway.sln

      - name: Publish
        run: dotnet publish src/AuthGateway.Api/AuthGateway.Api.csproj --configuration Release --output ./publish

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy function app package
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ vars.AZURE_FUNCTION_APP_NAME }}
          package: api/publish
