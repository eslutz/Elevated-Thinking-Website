name: Production Deploy

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      operation:
        description: Operation to run
        type: choice
        required: true
        default: rollback
        options:
          - rollback
      rollback_slot:
        description: Optional rollback target slot (blue or green)
        type: string
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: production-hostinger
  cancel-in-progress: true

jobs:
  verify:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify release tag matches package version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          PACKAGE_VERSION="v$(node -p "require('./package.json').version")"

          if [ "$PACKAGE_VERSION" != "$RELEASE_TAG" ]; then
            echo "::error::Tag $RELEASE_TAG does not match package.json version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Check formatting
        run: npm run format:check

      - name: Check types
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test:unit -- --coverage

      - name: Install Playwright browser dependencies
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: npm run test:smoke

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: playwright-report-production-${{ github.run_id }}
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload production artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: production-dist
          path: dist
          if-no-files-found: error

  deploy:
    if: github.event_name == 'push'
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write
    environment:
      name: prod
      url: ${{ vars.PROD_SITE_URL }}
    steps:
      - name: Download production artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: production-dist
          path: dist

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install --yes lftp

      - name: Configure Hostinger SSH key
        env:
          HOSTINGER_KNOWN_HOSTS: ${{ secrets.HOSTINGER_KNOWN_HOSTS }}
          HOSTINGER_SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [ -z "$HOSTINGER_SSH_PRIVATE_KEY" ]; then
            echo "::error::Missing required secret: HOSTINGER_SSH_PRIVATE_KEY"
            exit 1
          fi

          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"

          ssh_key_path="$RUNNER_TEMP/hostinger_deploy_key"
          printf '%s\n' "$HOSTINGER_SSH_PRIVATE_KEY" > "$ssh_key_path"
          chmod 600 "$ssh_key_path"

          if [ -n "$HOSTINGER_KNOWN_HOSTS" ]; then
            printf '%s\n' "$HOSTINGER_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
            strict_host_key_checking="yes"
          else
            touch "$HOME/.ssh/known_hosts"
            strict_host_key_checking="accept-new"
          fi
          chmod 644 "$HOME/.ssh/known_hosts"

          {
            echo "HOSTINGER_SSH_KEY_PATH=$ssh_key_path"
            echo "HOSTINGER_STRICT_HOST_KEY_CHECKING=$strict_host_key_checking"
          } >> "$GITHUB_ENV"

      - name: Deploy blue/green slot to Hostinger over SFTP
        env:
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_REMOTE_PATH: ${{ secrets.HOSTINGER_REMOTE_PATH }}
          HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
        run: |
          set -euo pipefail

          HOSTINGER_PORT="${HOSTINGER_PORT:-22}"
          if [ "$HOSTINGER_REMOTE_PATH" != "/" ]; then
            HOSTINGER_REMOTE_PATH="${HOSTINGER_REMOTE_PATH%/}"
          fi
          SLOTS_ROOT="$HOSTINGER_REMOTE_PATH/.deploy-slots"
          ACTIVE_SLOT_FILE=".active-slot"
          SSH_CONNECT_PROGRAM="ssh -a -x -i $HOSTINGER_SSH_KEY_PATH -o BatchMode=yes -o PreferredAuthentications=publickey -o IdentitiesOnly=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts -o StrictHostKeyChecking=$HOSTINGER_STRICT_HOST_KEY_CHECKING -o ConnectTimeout=20 -o ConnectionAttempts=1"

          for required in HOSTINGER_HOST HOSTINGER_REMOTE_PATH HOSTINGER_USERNAME HOSTINGER_SSH_KEY_PATH HOSTINGER_STRICT_HOST_KEY_CHECKING; do
            if [ -z "${!required}" ]; then
              echo "::error::Missing required secret: $required"
              exit 1
            fi
          done

          tmp_dir="$(mktemp -d)"
          cleanup() {
            rm -rf "$tmp_dir"
          }
          trap cleanup EXIT

          active_slot="green"
          if lftp -u "$HOSTINGER_USERNAME","" "sftp://$HOSTINGER_HOST:$HOSTINGER_PORT" <<EOF_LFTP
          set sftp:connect-program "$SSH_CONNECT_PROGRAM"
          set sftp:auto-confirm yes
          set net:max-retries 2
          set net:reconnect-interval-base 5
          set net:timeout 20
          get -O "$tmp_dir" "$SLOTS_ROOT/$ACTIVE_SLOT_FILE"
          bye
          EOF_LFTP
          then
            candidate_slot="$(tr -d '[:space:]' < "$tmp_dir/$ACTIVE_SLOT_FILE" || true)"
            if [ "$candidate_slot" = "blue" ] || [ "$candidate_slot" = "green" ]; then
              active_slot="$candidate_slot"
            fi
          else
            echo "No existing active slot marker found. Using green as the previous slot."
          fi

          if [ "$active_slot" = "blue" ]; then
            target_slot="green"
          else
            target_slot="blue"
          fi

          echo "Current active slot: $active_slot"
          echo "Deploying new release to slot: $target_slot"

          printf '%s\n' "$target_slot" > "$tmp_dir/$ACTIVE_SLOT_FILE"

          lftp -u "$HOSTINGER_USERNAME","" "sftp://$HOSTINGER_HOST:$HOSTINGER_PORT" <<EOF_LFTP
          set sftp:connect-program "$SSH_CONNECT_PROGRAM"
          set sftp:auto-confirm yes
          set net:max-retries 2
          set net:reconnect-interval-base 5
          set net:timeout 20
          mkdir -p "$SLOTS_ROOT/blue"
          mkdir -p "$SLOTS_ROOT/green"
          mirror --reverse --delete --verbose dist "$SLOTS_ROOT/$target_slot"
          mirror --reverse --delete --verbose --exclude-glob .deploy-slots/ dist "$HOSTINGER_REMOTE_PATH"
          put -O "$SLOTS_ROOT" "$tmp_dir/$ACTIVE_SLOT_FILE"
          bye
          EOF_LFTP

          echo "Promotion complete. Active slot set to: $target_slot"

      - name: Create GitHub release for deployed tag
        uses: actions/github-script@v9.0.0
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        with:
          script: |
            const tag = process.env.RELEASE_TAG;

            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });

              core.info(`Release ${tag} already exists. Skipping creation.`);
              return;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              target_commitish: context.sha,
              name: tag,
              generate_release_notes: true,
              make_latest: 'true',
            });

  rollback:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.operation == 'rollback'
    runs-on: ubuntu-latest
    permissions:
      deployments: write
    environment:
      name: prod
      url: ${{ vars.PROD_SITE_URL }}
    steps:
      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install --yes lftp

      - name: Configure Hostinger SSH key
        env:
          HOSTINGER_KNOWN_HOSTS: ${{ secrets.HOSTINGER_KNOWN_HOSTS }}
          HOSTINGER_SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [ -z "$HOSTINGER_SSH_PRIVATE_KEY" ]; then
            echo "::error::Missing required secret: HOSTINGER_SSH_PRIVATE_KEY"
            exit 1
          fi

          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"

          ssh_key_path="$RUNNER_TEMP/hostinger_deploy_key"
          printf '%s\n' "$HOSTINGER_SSH_PRIVATE_KEY" > "$ssh_key_path"
          chmod 600 "$ssh_key_path"

          if [ -n "$HOSTINGER_KNOWN_HOSTS" ]; then
            printf '%s\n' "$HOSTINGER_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
            strict_host_key_checking="yes"
          else
            touch "$HOME/.ssh/known_hosts"
            strict_host_key_checking="accept-new"
          fi
          chmod 644 "$HOME/.ssh/known_hosts"

          {
            echo "HOSTINGER_SSH_KEY_PATH=$ssh_key_path"
            echo "HOSTINGER_STRICT_HOST_KEY_CHECKING=$strict_host_key_checking"
          } >> "$GITHUB_ENV"

      - name: Roll back production to previous slot
        env:
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_REMOTE_PATH: ${{ secrets.HOSTINGER_REMOTE_PATH }}
          HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
          ROLLBACK_SLOT_INPUT: ${{ github.event.inputs.rollback_slot }}
        run: |
          set -euo pipefail

          HOSTINGER_PORT="${HOSTINGER_PORT:-22}"
          if [ "$HOSTINGER_REMOTE_PATH" != "/" ]; then
            HOSTINGER_REMOTE_PATH="${HOSTINGER_REMOTE_PATH%/}"
          fi
          SLOTS_ROOT="$HOSTINGER_REMOTE_PATH/.deploy-slots"
          ACTIVE_SLOT_FILE=".active-slot"
          SSH_CONNECT_PROGRAM="ssh -a -x -i $HOSTINGER_SSH_KEY_PATH -o BatchMode=yes -o PreferredAuthentications=publickey -o IdentitiesOnly=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts -o StrictHostKeyChecking=$HOSTINGER_STRICT_HOST_KEY_CHECKING -o ConnectTimeout=20 -o ConnectionAttempts=1"

          for required in HOSTINGER_HOST HOSTINGER_REMOTE_PATH HOSTINGER_USERNAME HOSTINGER_SSH_KEY_PATH HOSTINGER_STRICT_HOST_KEY_CHECKING; do
            if [ -z "${!required}" ]; then
              echo "::error::Missing required secret: $required"
              exit 1
            fi
          done

          tmp_dir="$(mktemp -d)"
          rollback_dist="$tmp_dir/rollback-dist"
          cleanup() {
            rm -rf "$tmp_dir"
          }
          trap cleanup EXIT

          lftp -u "$HOSTINGER_USERNAME","" "sftp://$HOSTINGER_HOST:$HOSTINGER_PORT" <<EOF_LFTP
          set sftp:connect-program "$SSH_CONNECT_PROGRAM"
          set sftp:auto-confirm yes
          set net:max-retries 2
          set net:reconnect-interval-base 5
          set net:timeout 20
          get -O "$tmp_dir" "$SLOTS_ROOT/$ACTIVE_SLOT_FILE"
          bye
          EOF_LFTP

          active_slot="$(tr -d '[:space:]' < "$tmp_dir/$ACTIVE_SLOT_FILE" || true)"
          if [ "$active_slot" != "blue" ] && [ "$active_slot" != "green" ]; then
            echo "::error::Cannot determine active slot from $SLOTS_ROOT/$ACTIVE_SLOT_FILE"
            exit 1
          fi

          requested_slot="$(printf '%s' "$ROLLBACK_SLOT_INPUT" | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')"
          if [ -n "$requested_slot" ]; then
            if [ "$requested_slot" != "blue" ] && [ "$requested_slot" != "green" ]; then
              echo "::error::rollback_slot must be blue or green when provided."
              exit 1
            fi
            rollback_slot="$requested_slot"
          else
            if [ "$active_slot" = "blue" ]; then
              rollback_slot="green"
            else
              rollback_slot="blue"
            fi
          fi

          echo "Active slot: $active_slot"
          echo "Rollback target slot: $rollback_slot"

          mkdir -p "$rollback_dist"

          lftp -u "$HOSTINGER_USERNAME","" "sftp://$HOSTINGER_HOST:$HOSTINGER_PORT" <<EOF_LFTP
          set sftp:connect-program "$SSH_CONNECT_PROGRAM"
          set sftp:auto-confirm yes
          set net:max-retries 2
          set net:reconnect-interval-base 5
          set net:timeout 20
          mirror --verbose "$SLOTS_ROOT/$rollback_slot" "$rollback_dist"
          bye
          EOF_LFTP

          if [ ! -f "$rollback_dist/index.html" ]; then
            echo "::error::Rollback slot $rollback_slot does not contain a valid release (missing index.html)."
            exit 1
          fi

          printf '%s\n' "$rollback_slot" > "$tmp_dir/$ACTIVE_SLOT_FILE"

          lftp -u "$HOSTINGER_USERNAME","" "sftp://$HOSTINGER_HOST:$HOSTINGER_PORT" <<EOF_LFTP
          set sftp:connect-program "$SSH_CONNECT_PROGRAM"
          set sftp:auto-confirm yes
          set net:max-retries 2
          set net:reconnect-interval-base 5
          set net:timeout 20
          mirror --reverse --delete --verbose --exclude-glob .deploy-slots/ "$rollback_dist" "$HOSTINGER_REMOTE_PATH"
          put -O "$SLOTS_ROOT" "$tmp_dir/$ACTIVE_SLOT_FILE"
          bye
          EOF_LFTP

          echo "Rollback complete. Active slot set to: $rollback_slot"
