name: Production Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-hostinger
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6.1.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Check types
        run: npm run typecheck

      - name: Build production bundle
        run: npm run build

      - name: Upload production artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: production-dist
          path: dist
          if-no-files-found: error

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write
    environment:
      name: prod
      url: ${{ vars.PROD_SITE_URL }}
    steps:
      - name: Download production artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: production-dist
          path: dist

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install --yes lftp

      - name: Deploy to Hostinger over SFTP
        env:
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_REMOTE_PATH: ${{ secrets.HOSTINGER_REMOTE_PATH }}
          HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
          HOSTINGER_PASSWORD: ${{ secrets.HOSTINGER_PASSWORD }}
        run: |
          set -euo pipefail

          HOSTINGER_PORT="${HOSTINGER_PORT:-22}"

          for required in HOSTINGER_HOST HOSTINGER_REMOTE_PATH HOSTINGER_USERNAME HOSTINGER_PASSWORD; do
            if [ -z "${!required}" ]; then
              echo "::error::Missing required secret: $required"
              exit 1
            fi
          done

          lftp -u "$HOSTINGER_USERNAME","$HOSTINGER_PASSWORD" "sftp://$HOSTINGER_HOST:$HOSTINGER_PORT" <<EOF
          set sftp:auto-confirm yes
          set net:max-retries 2
          set net:reconnect-interval-base 5
          set net:timeout 20
          mirror --reverse --delete --verbose dist "$HOSTINGER_REMOTE_PATH"
          bye
          EOF

      - name: Create GitHub release for deployed commit
        uses: actions/github-script@v8.0.0
        env:
          RELEASE_TAG: prod-${{ github.sha }}
          RELEASE_TITLE: Production deploy ${{ github.sha }}
        with:
          script: |
            const tag = process.env.RELEASE_TAG;
            const shortSha = context.sha.slice(0, 7);

            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });

              core.info(`Release ${tag} already exists. Skipping creation.`);
              return;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              target_commitish: context.sha,
              name: `Production deploy ${shortSha}`,
              generate_release_notes: true,
              make_latest: 'true',
            });
