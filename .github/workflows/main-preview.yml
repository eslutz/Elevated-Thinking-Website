name: Main Preview Deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".github/**"

permissions:
  contents: read

concurrency:
  group: preview-main-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build_main_preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build main preview bundle
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          if [ "$REPO_NAME" = "$REPO_OWNER.github.io" ]; then
            SITE_PREFIX=""
          else
            SITE_PREFIX="/$REPO_NAME"
          fi

          npm run build -- --base="${SITE_PREFIX}/preview/"

      - name: Upload main preview artifact
        uses: actions/upload-artifact@v7
        with:
          name: main-preview-dist
          path: dist
          if-no-files-found: error

  deploy_main_preview:
    needs: build_main_preview
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Download main preview artifact
        uses: actions/download-artifact@v8
        with:
          name: main-preview-dist
          path: dist

      - name: Publish main preview and index to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PREVIEW_DIR: preview
          REPO_URL: https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
        run: |
          set -euo pipefail

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads "$REPO_URL" gh-pages >/dev/null 2>&1; then
            git clone --depth 1 --branch gh-pages "$REPO_URL" gh-pages
          else
            git init gh-pages
            (
              cd gh-pages
              git checkout --orphan gh-pages
              touch .nojekyll
              git add .nojekyll
              git commit -m "Initialize GitHub Pages branch"
              git remote add origin "$REPO_URL"
              git push origin gh-pages
            )
          fi

          mkdir -p "gh-pages/$PREVIEW_DIR"
          rsync -a --delete dist/ "gh-pages/$PREVIEW_DIR/"
          touch gh-pages/.nojekyll

          OPEN_PRS_JSON="$(curl -sSf -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${GITHUB_REPOSITORY}/pulls?state=open&per_page=100")"
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          REPO_OWNER="${GITHUB_REPOSITORY%%/*}"

          if [ "$REPO_NAME" = "$REPO_OWNER.github.io" ]; then
            SITE_PREFIX=""
          else
            SITE_PREFIX="/$REPO_NAME"
          fi

          export OPEN_PRS_JSON REPO_NAME SITE_PREFIX

          node scripts/build-preview-index.mjs gh-pages/index.html

          (
            cd gh-pages
            git add -A .

            if git diff --cached --quiet; then
              echo "No preview changes to publish."
              exit 0
            fi

            git commit -m "Deploy main preview from ${GITHUB_SHA}"
            git push origin gh-pages
          )
